<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나는 어떤 디자이너인가</title>
<link href="https://cdn.jsdelivr.net/npm/@fontsource-variable/chiron-goround-tc/index.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red-dark: #6b0f1a;
  --red-mid:  #a82232;
  --cream:    #fdf3c8;
  --gold:     #f9c95c;
  --card-bg:  #fffef5;
  --text:     #2a0a0f;
  --text-sub: #9a6060;
  --border:   #f0d8c0;
}
body {
  font-family: 'Chiron GoRound TC Variable', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
  padding: 40px 20px 80px;
}
.container { max-width: 520px; margin: 0 auto; }

header { text-align: center; margin-bottom: 40px; }
.intro-tag {
  display: inline-block; background: rgba(168,34,50,0.1);
  border-radius: 999px; padding: 5px 16px;
  font-size: 0.75rem; color: var(--red-mid); margin-bottom: 16px; font-weight: 600;
}
header h1 { font-size: 1.7rem; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 8px; color: var(--red-dark); }
header p { color: var(--text-sub); font-size: 0.88rem; }

.card {
  background: var(--card-bg); border-radius: 16px; padding: 24px;
  margin-bottom: 12px; box-shadow: 0 1px 4px rgba(107,15,26,0.08);
  border: 1px solid var(--border);
}
.question { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #f5e8d8; }
.question:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.q-text { font-size: 0.9rem; color: var(--text); margin-bottom: 12px; line-height: 1.65; }

.scale { display: flex; gap: 5px; align-items: center; }
.scale-label { font-size: 0.65rem; color: #c8a0a0; min-width: 7rem; flex-shrink: 0; text-align: center; line-height: 1.3; white-space: nowrap; word-break: keep-all; }
.scale-btns { display: flex; gap: 4px; flex: 1; justify-content: center; }
.scale-btn {
  width: 36px; height: 36px; border-radius: 8px;
  border: 1.5px solid #f0d8c0; background: #fff9f0;
  color: #c8a0a0; font-size: 0.82rem; font-weight: 700;
  cursor: pointer; transition: all 0.12s;
}
.scale-btn:hover { border-color: var(--red-mid); color: var(--red-mid); background: #fff0f0; }
.scale-btn.selected { color: #fff; border-color: transparent; background: var(--red-mid); }

.progress-wrap { margin-bottom: 28px; }
.progress-bar { background: rgba(168,34,50,0.12); border-radius: 999px; height: 5px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--red-mid), var(--gold)); transition: width 0.3s; }
.progress-text { text-align: right; font-size: 0.7rem; color: var(--text-sub); margin-top: 5px; }

.btn-primary {
  display: block; width: 100%; padding: 16px;
  background: var(--red-dark); border: none; border-radius: 12px;
  color: var(--cream); font-size: 0.92rem; font-weight: 700;
  cursor: pointer; transition: opacity 0.2s; font-family: inherit; margin-top: 12px;
}
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.25; cursor: not-allowed; }
.btn-secondary {
  display: block; width: 100%; padding: 15px;
  background: transparent; border: 1.5px solid var(--border); border-radius: 12px;
  color: var(--text-sub); font-size: 0.88rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.btn-secondary:hover { border-color: var(--red-mid); color: var(--red-mid); }
.btn-row { display: flex; flex-direction: column; gap: 10px; }

.result-hero {
  background: var(--card-bg); border-radius: 24px;
  padding: 36px 28px 32px; text-align: center;
  box-shadow: 0 4px 24px rgba(107,15,26,0.12);
  border: 1px solid var(--border); margin-bottom: 14px;
}
.result-name-line { font-size: 1rem; font-weight: 700; color: var(--text-sub); margin-bottom: 20px; text-align: center; }
.result-card-title { font-size: 1rem; font-weight: 700; color: var(--text-sub); margin-bottom: 14px; text-align: center; }
.result-hero-body { margin-bottom: 24px; }
.result-hero-body .result-subtitle { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 4px; }
.result-hero-body .result-typename { font-size: 2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 0; }
.char-wrap { margin: 0 auto 24px; width: 160px; height: 160px; display: flex; align-items: center; justify-content: center; }
.result-tags { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-bottom: 18px; }
.result-tag { padding: 5px 13px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; background: rgba(249,201,92,0.2); color: #7a4a00; }
.result-oneliner { font-size: 1rem; font-weight: 800; color: var(--red-dark); line-height: 1.5; }

.bullets-card {
  background: var(--card-bg); border-radius: 20px;
  padding: 24px 24px 24px 20px;
  box-shadow: 0 2px 12px rgba(107,15,26,0.08);
  border: 1px solid var(--border); margin-bottom: 14px;
}
.bullets-card .result-name-line { margin-bottom: 14px; }
.bullets-list { list-style: none; }
.bullets-list li {
  font-size: 0.88rem; color: #4a2020; line-height: 1.65;
  padding: 6px 0 6px 18px; position: relative;
  border-bottom: 1px solid #f5e8d8;
}
.bullets-list li:last-child { border-bottom: none; }
.bullets-list li::before { content: '•'; position: absolute; left: 4px; top: 50%; transform: translateY(-50%); color: var(--gold); font-size: 1rem; }

.sub-result {
  background: var(--card-bg); border-radius: 16px;
  padding: 18px 20px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px;
  box-shadow: 0 2px 8px rgba(107,15,26,0.07);
  border: 1px solid var(--border); margin-bottom: 14px;
}
.sub-result .sub-label,
.sub-result .sub-name,
.sub-result .sub-oneliner { text-align: center; }
.sub-label { font-size: 0.68rem; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0; }
.sub-name { font-size: 1rem; font-weight: 800; }
.sub-oneliner { font-size: 0.78rem; color: var(--text-sub); margin-top: 0; }

.score-card {
  background: var(--card-bg); border-radius: 16px; padding: 22px 20px;
  box-shadow: 0 2px 8px rgba(107,15,26,0.07);
  border: 1px solid var(--border); margin-bottom: 14px;
}
.score-card .result-card-title { margin-bottom: 16px; }
.score-group { margin-bottom: 20px; }
.score-group:last-child { margin-bottom: 0; }
.score-group-label { font-size: 0.72rem; font-weight: 700; margin-bottom: 12px; }
.score-row { margin-bottom: 14px; }
.score-row:last-child { margin-bottom: 0; }
.score-meta { display: flex; justify-content: space-between; margin-bottom: 7px; }
.score-name-txt { font-size: 0.82rem; font-weight: 700; }
.score-right-txt { font-size: 0.8rem; color: var(--text-sub); }
.bar-bg { background: rgba(168,34,50,0.1); border-radius: 999px; height: 7px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 999px; transition: width 0.9s cubic-bezier(.4,0,.2,1); }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="intro-tag">디자이너 성향 테스트</div>
    <h1>나는 뭘 할 때<br>제일 신나는 디자이너야?</h1>
    <p>솔직하게 답할수록 잘 맞아요.</p>
  </header>

  <div id="nameStep">
    <div class="card" style="text-align:center; padding:36px 28px;">
      <div style="font-size:1.5rem; margin-bottom:8px;">👋</div>
      <div style="font-size:1rem; font-weight:800; color:var(--red-dark); margin-bottom:24px;">먼저 이름을 알려주세요</div>
      <input id="nameInput" type="text" placeholder="이름 또는 닉네임"
        style="width:100%; padding:14px 16px; border-radius:10px; border:1.5px solid var(--border);
               background:#fff9f0; font-size:0.95rem; color:var(--text); outline:none;
               font-family:inherit; text-align:center; margin-bottom:14px;" />
      <button id="nameNextBtn" class="btn-primary" disabled>시작하기</button>
    </div>
  </div>

  <div id="testStep" style="display:none;">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
      <div class="progress-text" id="pText">0 / 20</div>
    </div>
    <div class="card" id="qList"></div>
    <button id="submitBtn" class="btn-primary" disabled>결과 확인하기</button>
  </div>

  <div id="resultStep" style="display:none;">
    <div id="resultCapture">
      <div class="result-hero">
        <div class="result-hero-body">
          <div class="result-subtitle" id="rSubtitle"></div>
          <div class="result-typename" id="rTypename"></div>
        </div>
        <div class="char-wrap" id="rChar"></div>
        <div class="result-tags" id="rTags"></div>
        <div class="result-oneliner" id="rOneliner"></div>
      </div>
      <div class="bullets-card">
        <div class="result-name-line" id="rBulletsTitle"></div>
        <ul class="bullets-list" id="rBullets"></ul>
      </div>
      <div class="sub-result" id="rSub"></div>
      <div class="score-card">
        <div class="result-card-title">전체 점수</div>
        <div id="rScores"></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="goRetry()">🔄 다시 테스트하기</button>
      <button class="btn-secondary" onclick="saveAsJpeg()">💾 결과 저장하기</button>
    </div>
  </div>

</div>

const ALL_QS = [
  {ax:"A",text:"나는 프로젝트가 시장에 어떤 영향을 줄지 생각할 때 가장 흥분된다."},
  {ax:"A",text:"디자인보다 비즈니스 모델 이야기가 더 재밌다."},
  {ax:"A",text:'"이게 돈이 되나?"를 자연스럽게 먼저 묻는다.'},
  {ax:"A",text:"결과 KPI가 명확하면 동기부여가 강해진다."},
  {ax:"A",text:"전략적 방향 설정에 참여할 때 에너지가 올라간다."},
  {ax:"B",text:"작은 디테일이 틀어져 있으면 계속 신경 쓰인다."},
  {ax:"B",text:"완성도가 높아질 때 깊은 만족을 느낀다."},
  {ax:"B",text:"사용자가 느끼는 감정선을 섬세하게 다듬는 게 재밌다."},
  {ax:"B",text:"결과물이 아름답지 않으면 찝찝하다."},
  {ax:"B",text:"깊이 있는 집중 시간이 필요하다."},
  {ax:"C",text:"새로운 툴, 기술, AI 활용법을 실험하는 게 재밌다."},
  {ax:"C",text:"기존 방식을 의심하고 바꾸고 싶다."},
  {ax:"C",text:"구조를 다시 설계하는 일이 흥미롭다."},
  {ax:"C",text:'"우리가 왜 이렇게 하고 있지?"를 자주 묻는다.'},
  {ax:"C",text:"불확실성이 있어도 탐색이 즐겁다."},
  {ax:"D",text:"팀의 일하는 방식을 정리할 때 만족감을 느낀다."},
  {ax:"D",text:"프로세스를 반복 가능하게 만드는 게 중요하다."},
  {ax:"D",text:"운영이 매끄러워질 때 기분이 좋다."},
  {ax:"D",text:"혼란스러운 상황을 정돈하는 역할을 자주 맡는다."},
  {ax:"D",text:"명확한 역할/구조가 있을 때 안정감을 느낀다."}
];

let userName = '';
let shuffled = [];
let sc = {A:0,B:0,C:0,D:0};
let picked = {};
let answered = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function lv(s) {
  if (s >= 22) return {label:"🔥 지배적 정체성", color:"#a82232"};
  if (s >= 18) return {label:"⚖️ 강한 성향",     color:"#5a5a5f"};
  if (s >= 15) return {label:"🌊 보조 동기",      color:"#5a5a5f"};
  return             {label:"💤 약한 성향",       color:"#c8a0a0"};
}

function show(id) {
  ['nameStep','testStep','resultStep'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}

document.getElementById('nameInput').addEventListener('input', function() {
  document.getElementById('nameNextBtn').disabled = !this.value.trim();
});
document.getElementById('nameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') startTest();
});
document.getElementById('nameNextBtn').addEventListener('click', startTest);

function startTest() {
  const val = document.getElementById('nameInput').value.trim();
  if (!val) return;
  userName = val;
  buildQuestions();
  show('testStep');
  window.scrollTo({top:0, behavior:'smooth'});
}

function buildQuestions() {
  sc = {A:0,B:0,C:0,D:0};
  picked = {};
  answered = 0;
  document.getElementById('pFill').style.width = '0%';
  document.getElementById('pText').textContent = '0 / 20';
  document.getElementById('submitBtn').disabled = true;

  shuffled = shuffle(ALL_QS);
  const el = document.getElementById('qList');
  el.innerHTML = '';
  shuffled.forEach(function(q, i) {
    el.insertAdjacentHTML('beforeend',
      '<div class="question">' +
        '<div class="q-text">' + q.text + '</div>' +
        '<div class="scale">' +
          '<span class="scale-label">전혀 아니다</span>' +
          '<div class="scale-btns">' +
            [1,2,3,4,5].map(function(v) {
              return '<button class="scale-btn" data-idx="' + i + '" data-v="' + v + '">' + v + '</button>';
            }).join('') +
          '</div>' +
          '<span class="scale-label">매우 그렇다</span>' +
        '</div>' +
      '</div>'
    );
  });

  document.getElementById('qList').addEventListener('click', function(e) {
    const btn = e.target.closest('.scale-btn');
    if (!btn) return;
    const idx = +btn.dataset.idx, v = +btn.dataset.v;
    const ax = shuffled[idx].ax;
    if (picked[idx] === undefined) {
      answered++;
    } else {
      sc[ax] -= picked[idx];
    }
    picked[idx] = v;
    sc[ax] += v;
    document.querySelectorAll('.scale-btn[data-idx="' + idx + '"]').forEach(function(b) { b.classList.remove('selected'); });
    btn.classList.add('selected');
    document.getElementById('pFill').style.width = (answered/20*100) + '%';
    document.getElementById('pText').textContent = answered + ' / 20';
    if (answered === 20) document.getElementById('submitBtn').disabled = false;
  });
}

document.getElementById('submitBtn').addEventListener('click', showResult);

function showResult() {
  const sorted = Object.entries(sc).sort(function(a,b){ return b[1]-a[1]; });
  const mAx = sorted[0][0], mSc = sorted[0][1];
  const sAx = sorted[1][0], sSc = sorted[1][1];
  const m = TYPES[mAx], s = TYPES[sAx];

  document.getElementById('rSubtitle').textContent = m.subtitle;
  document.getElementById('rBulletsTitle').textContent = userName + '님은 이런 디자이너예요';
  document.getElementById('rTypename').innerHTML = '<span style="color:' + m.color + '">' + m.nickname + '</span>';
  document.getElementById('rChar').innerHTML = CHARS[mAx];
  document.getElementById('rTags').innerHTML = m.tags.map(function(t){ return '<span class="result-tag">' + t + '</span>'; }).join('');
  document.getElementById('rOneliner').innerHTML = m.oneliner;
  document.getElementById('rBullets').innerHTML = m.bullets.map(function(b){ return '<li>' + b + '</li>'; }).join('');
  document.getElementById('rSub').innerHTML =
    '<div class="result-card-title">보조 유형</div>' +
    '<div style="font-size:1.6rem; line-height:1;">' + s.icon + '</div>' +
    '<div class="sub-name" style="color:' + s.color + '">' + s.nickname + '</div>' +
    '<div class="sub-oneliner">' + s.oneliner.replace(/<br>/g,' ') + '</div>';

  const groups = {};
  sorted.forEach(function(item) {
    const lvInfo = lv(item[1]);
    if (!groups[lvInfo.label]) groups[lvInfo.label] = {color:lvInfo.color, items:[]};
    groups[lvInfo.label].items.push(item);
  });

  let barsHTML = '';
  Object.entries(groups).forEach(function(entry) {
    const label = entry[0], group = entry[1];
    barsHTML += '<div class="score-group"><div class="score-group-label" style="color:' + group.color + '">' + label + '</div>';
    group.items.forEach(function(item) {
      const t = TYPES[item[0]], pct = Math.round(item[1]/25*100);
      barsHTML +=
        '<div class="score-row">' +
          '<div class="score-meta">' +
            '<span class="score-name-txt" style="color:' + t.color + '">' + t.nickname + '</span>' +
            '<span class="score-right-txt">' + item[1] + '점</span>' +
          '</div>' +
          '<div class="bar-bg"><div class="bar-fill" style="width:0%;background:' + t.color + '" data-pct="' + pct + '"></div></div>' +
        '</div>';
    });
    barsHTML += '</div>';
  });
  document.getElementById('rScores').innerHTML = barsHTML;

  show('resultStep');
  window.scrollTo({top:0, behavior:'smooth'});

  setTimeout(function() {
    document.querySelectorAll('.bar-fill').forEach(function(el) {
      el.style.width = el.dataset.pct + '%';
    });
  }, 120);
}

async function saveAsJpeg() {
  var el = document.getElementById('resultCapture');
  el.style.padding = '20px';
  el.style.background = '#fdf3c8';
  var canvas = await html2canvas(el, {
    backgroundColor: '#fdf3c8',
    scale: 2,
    useCORS: true,
  });
  el.style.padding = '';
  el.style.background = '';
  var link = document.createElement('a');
  link.download = userName + '-디자이너-유형.jpg';
  link.href = canvas.toDataURL('image/jpeg', 0.92);
  link.click();
}

function goRetry() {
  document.getElementById('nameInput').value = '';
  document.getElementById('nameNextBtn').disabled = true;
  userName = '';
  show('nameStep');
  window.scrollTo({top:0, behavior:'smooth'});
}
